# HeliProxy by Klieer — Nginx config
# Place at: /etc/nginx/sites-available/heliproxy
# Enable:   ln -s /etc/nginx/sites-available/heliproxy /etc/nginx/sites-enabled/heliproxy
# SSL:      certbot --nginx -d vpn.helitop.ru

server {
    listen 80;
    listen [::]:80;
    server_name vpn.helitop.ru;

    # Redirect all HTTP to HTTPS once cert is issued.
    # Certbot will replace this block automatically.
    root /var/www/heliproxy;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /health {
        proxy_pass         http://127.0.0.1:3000/health;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_connect_timeout 3s;
        proxy_read_timeout    5s;
    }

    location /status {
        stub_status on;
        access_log  off;
        allow       127.0.0.1;
        deny        all;
    }
}

